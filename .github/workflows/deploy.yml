name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # ทำงานเมื่อมีการอัปเดตโค้ดที่สาขา main

# ตั้งค่าสิทธิ์ให้ GitHub สามารถเขียนไฟล์ลง Pages ได้
permissions:
  contents: read
  pages: write
  id-token: write

# ป้องกันไม่ให้รันซ้อนกันหลายรอบ
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # ลบบรรทัด cache: 'npm' ออกไปแล้วเพื่อแก้ Error

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist # โฟลเดอร์ที่ได้จากการ Build ของ Vite

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
